<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>در حال ساخت</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, sans-serif;
  }

  .container {
    text-align: center;
    animation: fadeIn 1.4s ease-out;
  }

  img {
    max-width: 90vw;
    max-height: 70vh;
    border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    animation: floatImg 4s ease-in-out infinite;
  }

  h1 {
    color: #fff;
    font-size: 3vw;
    margin-top: 25px;
    letter-spacing: 1px;
    animation: pulse 2.2s ease-in-out infinite;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes floatImg {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  @media (max-width: 700px) {
    h1 { font-size: 6vw; }
  }
</style>
</head>
<body>
  <div class="container">
    <img src="image.jpg" alt="در حال ساخت">
    <h1>نیگر ها درحال ساخت هستند 🚧</h1>
  </div>
</body>
</html>
